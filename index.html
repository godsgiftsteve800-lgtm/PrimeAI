<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PrimeAI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

<div class="logo">

<img src="logo.png" alt="PrimeAI Logo">

<div>

<h1>PrimeAI</h1>

<p>Think. Create. Evolve.</p>

</div>

</div>

<button id="clearChat">
New Chat
</button>

</header>

<div id="chatBox" class="chatBox">

<div class="bot">

Hello 👋

I'm <strong>PrimeAI</strong>.

Ask me anything.

</div>

</div>

<div class="inputArea">

<input
type="text"
id="userInput"
placeholder="Message PrimeAI...">

<button id="sendBtn">
Send
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
