<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <header>
        <h1>🤖 PrimeAI</h1>
        <p>Think. Create. Evolve.</p>
    </header>

    <div id="chatBox" class="chat-box">

        <div class="bot-message">
            👋 Hello! I'm PrimeAI.
            <br><br>
            Ask me anything.
        </div>

    </div>

    <div class="input-box">

        <input
            type="text"
            id="userInput"
            placeholder="Type a message...">

        <button id="sendBtn">
            Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
